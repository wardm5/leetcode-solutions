name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  java-tests:
    name: Java Tests and Coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: java

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Java tests and coverage gate
        run: mvn verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-jacoco-report
          path: java/target/site/jacoco/

  python-tests:
    name: Python Tests and Coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: python

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Python tests and coverage gate
        run: python -m pytest python/ --cov=. --cov-report=term-missing --cov-report=html --cov-fail-under=95

      - name: Upload coverage files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-files
          path: |
            python/.coverage
            python/htmlcov/